apiVersion: batch/v1
kind: Job
metadata:
  name: job-simple
  namespace: prj-antonio-minelli
  labels:
    app: job-simple
    env: test
    jobType: type1
spec:
  # auto-cleanup job dopo 10 secondi dalla terminazione
  ttlSecondsAfterFinished: 10
  # max 2 tentativi in caso di fallimento
  backoffLimit: 3
  template:
    metadata:
      name: pod-job-simple
      labels:
        app: job-simple
        env: test
        jobType: type1
    spec:
      # Never | OnFailure (default: OnFailure)
      restartPolicy: Never
      containers:
      - name: cnt-job-simple
        image: busybox:1.36
        command: ["sh","-c"]
        args:
          - |
            echo "========================================"
            echo " Job one-shot avviato"
            echo " Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo " Hostname pod: $HOSTNAME"
            echo "========================================"
            echo ""
            echo "Simulazione elaborazione batch..."
            for i in $(seq 1 5); do
              echo "  [step $i/5] elaborazione record $((i * 100))..."
              sleep 1
            done
            echo ""
            echo "Elaborazione completata con successo."
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
