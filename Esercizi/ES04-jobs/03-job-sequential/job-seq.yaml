apiVersion: batch/v1
kind: Job
metadata:
  name: job-sequential
  labels:
    scenario: job-sequential
spec:
  completions: 6             # 6 esecuzioni sequenziali
  parallelism: 1             # una alla volta
  backoffLimit: 2
  activeDeadlineSeconds: 180 # timeout globale: 3 minuti
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        name: pod-job-sequential
        scenario: job-sequential
    spec:
      restartPolicy: Never
      containers:
        - name: migrator
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "========================================"
              echo " Migrazione step sequenziale"
              echo " Pod: $HOSTNAME"
              echo "========================================"
              # In uno scenario reale qui leggeresti il prossimo item
              # da una coda (Redis, SQS, database, ecc.)
              echo "Acquisizione prossimo item dalla coda..."
              sleep 2
              ITEM="record_$(date +%s)"
              echo "Elaborazione item: $ITEM"
              sleep 3
              echo "Scrittura risultato nel database di destinazione..."
              sleep 1
              echo "Step completato: $ITEM migrato con successo."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi