apiVersion: batch/v1
kind: Job
metadata:
  name: job-parallel
  namespace: prj-antonio-minelli
  labels:
    app: job-parallel
    env: test
spec:
  # 6 unità di lavoro (job); 
  # ogni job lanciato avrà un idice (0..5)
  completions: 6
  # massimo 3 job in parallelo
  parrallelism: 3
  # Per ogni pod, verrà aggiunta nella annotation "batch.kubernetes.io/job-completion-index" l'indice del job (0..5)
  completionMode: Indexed
  # Se un job fallisce, verrà ritentato al massimo 2 volte prima di essere considerato definitivamente fallito
  backoffLimit: 2
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      name: pod-job-parallel
    spec:
      restartPolicy: Never
      containers:
        - name: cnt-job-parallel
          image: busybox:1.36
          command: ["sh", "-c"]
          args: 
            - |
              echo "========================================"
              echo " Job avviato"
              echo " Indice:  $JOB_COMPLETION_INDEX"
              echo " Pod:     $HOSTNAME"
              echo "========================================"
              # Simula workload diverso per indice (es. shard di dati)
              SHARD_START=$(( JOB_COMPLETION_INDEX * 1000 ))
              SHARD_END=$(( SHARD_START + 999 ))
              echo "Elaborazione shard [$SHARD_START - $SHARD_END]..."
              sleep $(( (JOB_COMPLETION_INDEX % 3) + 2 ))
              echo "Shard $JOB_COMPLETION_INDEX completato."
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          resources:
            requests:
              cpu: "50m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"