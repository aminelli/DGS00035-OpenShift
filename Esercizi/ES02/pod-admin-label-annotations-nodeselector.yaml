# OpenShift  version: 4.20.15
# Kubernetes version: v1.33.6
apiVersion: v1
kind: Pod
metadata:
  name: pod-oc-cli
  namespace: prj-antonio-minelli
  labels:
    app: pod-oc-cli
    env: debug
  annotations:
    description: "Pod per eseguire comandi oc in cluster"
    owner: "Antonio Minelli"
    build-version: "1.0.0"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  nodeSelector:
    env: prod
    dt: sdd
  containers:
  - name: cnt-oc-cli
    image: aminelli/cli-oc:v2
    command: ["/bin/bash", "-c", "sleep infinity"]
    securityContext:
      privileged: true
      