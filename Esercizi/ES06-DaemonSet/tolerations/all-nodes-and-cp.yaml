apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: daemonset-all-nodes
  namespace: prj-antonio-minelli
  labels:
    app: all-node-info
spec:
  selector:
    matchLabels:
      app: all-node-info
  template:
    metadata:
      name: pod-daemon-all-nodes
      labels:
        app: all-node-info
    spec:
      terminationGracePeriodSeconds: 5
      tolerations:
      # Stiamo forzando la creazione del daemonset su tutti i nodi, 
      # inclusi quelli control-plane, che di default hanno una taint che 
      # impedisce l'esecuzione di pod non tolleranti
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master # K8s < 1.24  (depecated)
        operator: Exists
        effect: NoSchedule
      # Taints non pronti
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
      # Taints di manutenzione (es. drain)
      - key: node.kubernetes.io/unschedulable
        operator: Exists
        effect: NoSchedule
      # Taints su pressione disco e ram
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
      containers:
      - name: agent
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        - |
          echo "=== DaemonSet pod avviato sul nodo: $NODE_NAME ==="
          echo "Pod:       $POD_NAME"
          echo "Nodo:      $NODE_NAME"
          echo "Namespace: $POD_NAMESPACE"
          echo "IP nodo:   $NODE_IP"
          echo "IP pod:    $POD_IP"
          echo ""
          echo "Info sistema del nodo:"
          uname -a
          echo ""
          echo "CPU online:"
          nproc
          echo ""
          echo "Memoria:"
          free -m
          # Loop per mantenere il pod in Running
          while true; do
            sleep 30
            echo "$(date -u '+%H:%M:%S') ancora in esecuzione su $NODE_NAME"
          done 
        env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName     # nome del nodo su cui gira il pod
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP     # IP del nodo host
        resources:
          requests: { cpu: 25m, memory: 8Mi }
          limits:   { cpu: 100m, memory: 16Mi }    