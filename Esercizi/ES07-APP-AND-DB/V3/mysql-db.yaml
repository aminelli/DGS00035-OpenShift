apiVersion: v1
kind: Pod
metadata:
  name: pod-mysql-db
  namespace: prj-antonio-minelli
  labels:
    app: mysql-db
spec:
  containers:
  - name: cnt-mysql-db
    image: docker.io/mysql:5.6
    env:    
    - name: MYSQL_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: secret-web-app
          key: DB_PASSWORD
      # value: Password123
    ports:
    - containerPort: 3306
      protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  name: svc-mysql-db
  namespace: prj-antonio-minelli
spec:
  type: ClusterIP
  selector:
    app: mysql-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306