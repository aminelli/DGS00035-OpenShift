apiVersion: v1
kind: Pod
metadata:
  name: pod-web-app
  namespace: prj-antonio-minelli
  labels:
    app: web-app
spec:
  containers:
  - name: cnt-web-app
    image: docker.io/bmuschko/web-app:1.0.1
    envFrom:
    - configMapRef:
        name: configmap-web-app
    - secretRef:
        name: secret-web-app  
    ports:
    - containerPort: 3000
      protocol: TCP

---

apiVersion: v1
kind: Service
metadata:
  name: svc-web-app
  namespace: prj-antonio-minelli
spec:
  type: ClusterIP
  selector:
    app: web-app
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000